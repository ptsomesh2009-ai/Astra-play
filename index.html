<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Astra Play</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f172a;
color:white;
min-height:100vh;
}

header{
background:#111827;
padding:15px;
text-align:center;
font-size:24px;
font-weight:bold;
box-shadow:0 2px 10px rgba(0,0,0,.4);
}

.container{
width:95%;
max-width:1000px;
margin:20px auto;
}

.player{
background:#1e293b;
border-radius:15px;
overflow:hidden;
box-shadow:0 0 20px rgba(0,0,0,.3);
}

.video-wrapper{
position:relative;
padding-bottom:56.25%;
height:0;
overflow:hidden;
}

.video-wrapper iframe{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
border:none;
}

.controls{
display:flex;
gap:10px;
padding:15px;
flex-wrap:wrap;
justify-content:center;
}

button{
border:none;
cursor:pointer;
padding:12px 18px;
border-radius:10px;
font-size:16px;
font-weight:bold;
color:white;
}

.share{
background:#3b82f6;
}

.openyt{
background:#ef4444;
}

.info{
text-align:center;
padding:20px;
color:#cbd5e1;
}

@media(max-width:600px){
button{
width:100%;
}
header{
font-size:20px;
}
}
</style>
</head>

<body>

<header>
🚀 Astra Play
</header>

<div class="container">

<div class="player">

<div class="video-wrapper">
<iframe
src="https://www.youtube.com/embed/tcR51kaYuKk"
title="Astra Play Video"
allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
allowfullscreen>
</iframe>
</div>

<div class="controls">

<button class="share" onclick="shareVideo()">
📤 Share
</button>

<button class="openyt"
onclick="window.open('https://youtu.be/tcR51kaYuKk','_blank')">
▶ Open in YouTube
</button>

</div>

</div>

<div class="info">
Watch videos with Astra Play
</div>

</div>

<script>
async function shareVideo(){
const shareData={
title:"Astra Play",
text:"Watch this video on Astra Play",
url:window.location.href
};

if(navigator.share){
try{
await navigator.share(shareData);
}catch(err){}
}else{
navigator.clipboard.writeText(window.location.href);
alert("Link copied!");
}
}
</script>

</body>
</html>
